<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="90" fill="#FF6B35" stroke="#333" stroke-width="2"/>
  
  <!-- Bike silhouette -->
  <g fill="#ffffff">
    <!-- Frame -->
    <line x1="60" y1="80" x2="100" y2="120" stroke="#ffffff" stroke-width="3"/>
    <line x1="100" y1="120" x2="140" y2="80" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Wheels -->
    <circle cx="50" cy="120" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="150" cy="120" r="20" fill="none" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Spokes -->
    <line x1="50" y1="100" x2="50" y2="140" stroke="#ffffff" stroke-width="1"/>
    <line x1="30" y1="120" x2="70" y2="120" stroke="#ffffff" stroke-width="1"/>
    <line x1="150" y1="100" x2="150" y2="140" stroke="#ffffff" stroke-width="1"/>
    <line x1="130" y1="120" x2="170" y2="120" stroke="#ffffff" stroke-width="1"/>
    
    <!-- Seat -->
    <ellipse cx="100" cy="115" rx="8" ry="5" fill="#ffffff"/>
    
    <!-- Handlebars -->
    <line x1="140" y1="80" x2="130" y2="70" stroke="#ffffff" stroke-width="2"/>
    <line x1="140" y1="80" x2="150" y2="70" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">OneLapFit</text>
</svg>
